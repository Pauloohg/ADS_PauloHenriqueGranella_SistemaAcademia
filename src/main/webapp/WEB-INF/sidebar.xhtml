<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:pm="http://primefaces.org/manhattan">

    <div class="layout-sidebar">
        <div class="layout-sidebar-logo">            
            <a href="#" id="layout-sidebar-anchor" class="layout-sidebar-anchor" title="Toggle Menu">
                <i class="pi"/>
            </a>
        </div>

        <div class="layout-menu-container">
            <h:form id="menuform">
                <pm:menu widgetVar="ManhattanMenuWidget">
                    <p:menuitem id="mnuPlano" value="Plano" icon="pi pi-fw pi-credit-card" outcome="/admin/plano.xhtml"/>
                    <p:menuitem id="mnuPersonal" value="Personal" icon="pi pi-fw pi-user" outcome="/admin/personal.xhtml"/>
                    <p:menuitem id="mnuAluno" value="Aluno" icon="pi pi-fw pi-users" outcome="/admin/aluno.xhtml"/>
                    <p:menuitem id="mnuAula" value="Aula" icon="pi pi-fw pi-calendar" outcome="/admin/aula.xhtml"/>
                    <p:menuitem id="mnuSair" value="Sair" action="#{loginController.logout()}" icon="pi pi-fw pi-sign-out"/>

                </pm:menu>
            </h:form>
        </div>
    </div>

</ui:composition>
