<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">

    <ui:define name="title">
        <h:outputText value="Aluno"/>
    </ui:define>

    <ui:define name="content">
        <h:form id="frmList">
            <h:panelGroup id="pngList">
                <p:growl id="growl" showDetail="true"/>
                <p:fieldset toggleable="true">
                    <p:dataTable id="datalist" value="#{alunoController.alunoList}" var="item"
                                 selectionMode="single" selection="#{alunoController.selected}"
                                 widgetVar="datalistAlunoWidgetVar"
                                 rowKey="#{item.id}"
                                 paginator="true" rows="5"
                                 rowsPerPageTemplate="5,10,50,100"
                                 emptyMessage="Nenhum aluno encontrado...">

                        <p:ajax event="rowSelect"   update="btnEdit btnDelete btnView"/>
                        <p:ajax event="rowUnselect" update="btnEdit btnDelete btnView"/>

                        <p:column width="4%" sortBy="#{item.id}">
                            <f:facet name="header"><h:outputText value="ID"/></f:facet>
                            <h:outputText value="#{item.id}"/>
                        </p:column>

                        <p:column width="15%" sortBy="#{item.nome}" filterBy="#{item.nome}">
                            <f:facet name="header"><h:outputText value="Nome"/></f:facet>
                            <h:outputText value="#{item.nome}"/>
                        </p:column>

                        <p:column width="15%" sortBy="#{item.email}" filterBy="#{item.email}">
                            <f:facet name="header"><h:outputText value="Email"/></f:facet>
                            <h:outputText value="#{item.email}"/>
                        </p:column>

                        <p:column width="10%" sortBy="#{item.telefone}">
                            <f:facet name="header"><h:outputText value="Telefone"/></f:facet>
                            <h:outputText value="#{item.telefone}"/>
                        </p:column>

                        <p:column width="10%" sortBy="#{item.dataNascimento}">
                            <f:facet name="header"><h:outputText value="Data Nasc."/></f:facet>
                            <h:outputText value="#{item.dataNascimento}">
                                <f:convertDateTime pattern="dd/MM/yyyy"/>
                            </h:outputText>
                        </p:column>

                        <p:column width="10%" sortBy="#{item.idPlano.nome}">
                            <f:facet name="header"><h:outputText value="Plano"/></f:facet>
                            <h:outputText value="#{item.idPlano.nome}"/>
                        </p:column>

                        <f:facet name="footer">
                            <p:commandButton id="btnCreate" value="Incluir Aluno" icon="pi pi-file"
                                             actionListener="#{alunoController.prepareAdicionar()}"
                                             update=":CreateForm"
                                             oncomplete="PF('dlgCreate').show()"/>

                            <p:commandButton id="btnEdit" value="Editar Aluno" icon="pi pi-user-edit"
                                             update=":formEdit" oncomplete="PF('dlgEdit').show()"
                                             disabled="#{empty alunoController.selected}"/>

                            <p:commandButton id="btnDelete" value="Excluir Aluno" icon="pi pi-trash"
                                             actionListener="#{alunoController.deletarAluno()}"
                                             update="frmList"
                                             disabled="#{empty alunoController.selected}">
                                <p:confirm header="Confirmar Exclusão"
                                           message="Você confirma a exclusão do aluno?"
                                           icon="ui-icon-alert"/>
                            </p:commandButton>

                            <p:commandButton id="btnView" value="Detalhes do Aluno" icon="pi pi-eye"
                                             update=":formView" oncomplete="PF('dlgView').show()"
                                             disabled="#{empty alunoController.selected}"/>
                        </f:facet>
                    </p:dataTable>
                </p:fieldset>

                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                    <p:commandButton value="Sim" type="button" styleClass="ui-confirmdialog-yes" icon="fa fa-check"/>
                    <p:commandButton value="Não" type="button" styleClass="ui-confirmdialog-no" icon="fa fa-times"/>
                </p:confirmDialog>
            </h:panelGroup>
        </h:form>

        <!-- Diálogo de Criação -->
        <p:dialog header="Novo Aluno" widgetVar="dlgCreate" width="500" showEffect="fade" modal="true" resizable="false">
            <h:form id="CreateForm">
                <p:growl id="growl" showDetail="true"/>
                <h:panelGrid columns="2" style="width:100%; margin-bottom:10px">

                    <p:outputLabel value="Nome:" for="iptNome" style="font-weight:bold"/>
                    <p:inputText id="iptNome" label="Nome" required="true"
                                 requiredMessage="O nome é obrigatório"
                                 value="#{alunoController.aluno.nome}"
                                 maxlength="200" style="width:300px"/>

                    <p:outputLabel value="Email:" for="iptEmail" style="font-weight:bold"/>
                    <p:inputText id="iptEmail" label="Email" required="true"
                                 requiredMessage="O email é obrigatório"
                                 value="#{alunoController.aluno.email}"
                                 maxlength="250" style="width:300px"/>

                    <p:outputLabel value="Telefone:" for="iptTelefone" style="font-weight:bold"/>
                    <p:inputMask id="iptTelefone" mask="(99) 99999-9999"
                                 value="#{alunoController.aluno.telefone}"
                                 style="width:300px"/>

                    <p:outputLabel value="Data Nascimento:" for="iptDataNascimento" style="font-weight:bold"/>
                    <p:inputMask id="iptDataNascimento" mask="99/99/9999" required="true"
                                 requiredMessage="A data de nascimento é obrigatória"
                                 value="#{alunoController.aluno.dataNascimento}"
                                 style="width:300px">
                        <f:convertDateTime pattern="dd/MM/yyyy"/>
                    </p:inputMask>

                    <p:outputLabel value="Plano:" for="iptPlano" style="font-weight:bold"/>
                    <p:selectOneMenu id="iptPlano" required="true"
                                     requiredMessage="O plano é obrigatório"
                                     value="#{alunoController.aluno.idPlano}"
                                     style="width:300px">
                        <f:selectItem itemLabel="Selecione um plano..." itemValue=""/>
                        <f:selectItems value="#{planoController.planoList}"
                                       var="pl" itemLabel="#{pl.nome}" itemValue="#{pl}"/>
                    </p:selectOneMenu>

                </h:panelGrid>
                <p:commandButton actionListener="#{alunoController.adicionarAluno()}"
                                 icon="pi pi-save" value="Cadastrar"
                                 update=":frmList :CreateForm"
                                 oncomplete="PF('dlgCreate').hide()"/>
            </h:form>
        </p:dialog>

        <!-- Diálogo de Edição -->
        <p:dialog header="Editar Aluno" widgetVar="dlgEdit" width="500" showEffect="fade" modal="true" resizable="false">
            <h:form id="formEdit">
                <p:growl id="growl" showDetail="true"/>
                <h:panelGrid columns="2" style="width:100%; margin-bottom:10px"
                             rendered="#{alunoController.selected != null}">

                    <p:outputLabel value="ID:" for="iptId" style="font-weight:bold"/>
                    <p:inputText id="iptId" disabled="true"
                                 value="#{alunoController.selected.id}"
                                 style="width:300px"/>

                    <p:outputLabel value="Nome:" for="iptNome" style="font-weight:bold"/>
                    <p:inputText id="iptNome" label="Nome" required="true"
                                 requiredMessage="O nome é obrigatório"
                                 value="#{alunoController.selected.nome}"
                                 maxlength="200" style="width:300px"/>

                    <p:outputLabel value="Email:" for="iptEmail" style="font-weight:bold"/>
                    <p:inputText id="iptEmail" label="Email" required="true"
                                 requiredMessage="O email é obrigatório"
                                 value="#{alunoController.selected.email}"
                                 maxlength="250" style="width:300px"/>

                    <p:outputLabel value="Telefone:" for="iptTelefone" style="font-weight:bold"/>
                    <p:inputMask id="iptTelefone" mask="(99) 99999-9999"
                                 value="#{alunoController.selected.telefone}"
                                 style="width:300px"/>

                    <p:outputLabel value="Data Nascimento:" for="iptDataNascimento" style="font-weight:bold"/>
                    <p:inputMask id="iptDataNascimento" mask="99/99/9999" required="true"
                                 requiredMessage="A data de nascimento é obrigatória"
                                 value="#{alunoController.selected.dataNascimento}"
                                 style="width:300px">
                        <f:convertDateTime pattern="dd/MM/yyyy"/>
                    </p:inputMask>

                    <p:outputLabel value="Plano:" for="iptPlano" style="font-weight:bold"/>
                    <p:selectOneMenu id="iptPlano" required="true"
                                     requiredMessage="O plano é obrigatório"
                                     value="#{alunoController.selected.idPlano}"
                                     style="width:300px">
                        <f:selectItem itemLabel="Selecione um plano..." itemValue=""/>
                        <f:selectItems value="#{planoController.planoList}"
                                       var="pl" itemLabel="#{pl.nome}" itemValue="#{pl}"/>
                    </p:selectOneMenu>

                </h:panelGrid>
                <p:commandButton value="Salvar" icon="pi pi-save"
                                 actionListener="#{alunoController.editarAluno()}"
                                 update="@form :frmList"
                                 oncomplete="PF('dlgEdit').hide()"/>
            </h:form>
        </p:dialog>

        <!-- Diálogo de Visualização -->
        <p:dialog header="Detalhes do Aluno" widgetVar="dlgView"
                  width="500" showEffect="fade" modal="true" resizable="false">
            <h:form id="formView">
                <h:panelGrid columns="2" style="width:100%"
                             rendered="#{alunoController.selected != null}">

                    <p:outputLabel value="ID:" style="font-weight:bold"/>
                    <p:outputLabel value="#{alunoController.selected.id}"/>

                    <p:outputLabel value="Nome:" style="font-weight:bold"/>
                    <p:outputLabel value="#{alunoController.selected.nome}"/>

                    <p:outputLabel value="Email:" style="font-weight:bold"/>
                    <p:outputLabel value="#{alunoController.selected.email}"/>

                    <p:outputLabel value="Telefone:" style="font-weight:bold"/>
                    <p:outputLabel value="#{alunoController.selected.telefone}"/>

                    <p:outputLabel value="Data Nascimento:" style="font-weight:bold"/>
                    <h:outputText value="#{alunoController.selected.dataNascimento}">
                        <f:convertDateTime pattern="dd/MM/yyyy"/>
                    </h:outputText>

                    <p:outputLabel value="Plano:" style="font-weight:bold"/>
                    <p:outputLabel value="#{alunoController.selected.idPlano.nome}"/>

                </h:panelGrid>
            </h:form>
        </p:dialog>

    </ui:define>
</ui:composition>
